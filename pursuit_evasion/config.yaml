sweep:
  k_values: [1, 2, 3]
  sigma: 1.0          # defender speed ratio (single value or list)
  p: 0.7              # kill probability (single value or list)

env:
  dt: 0.02
  max_steps: 500
  capture_radius: 0.03
  target_radius: 0.10
  target_pos: [0.5, 0.5]
  v_attacker: 1.0
  defender_inner_radius: 0.15
  defender_outer_radius: 0.35
  attacker_danger_radius: 0.15
  attacker_shaping: 0.01
  defender_shaping: 0.01

training:
  attacker_warmup_iters: 100
  attacker_iters: 10
  defender_iters: 10
  n_alternations: 12
  n_envs: 1024
  n_steps: 32
  n_epochs: 4
  minibatch_size: 2048
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

evaluation:
  n_episodes: 2000
  n_animations: 3

mode: "rl"            # "rl" or "heuristic" — heuristic skips training entirely
seed: 0
