# Centralized-defender training, sweep over k=1..5 at sigma=0.7, p=0.5,
# with defenders sorted by distance to the attacker (closest = slot 0).
# Mirrors config_vultr_central_k1_5_s07_p1_sorted.yaml; only p changed
# from 1.0 -> 0.5 so each in-range shot has 50% kill prob and missed
# shots stun the defender for stun_steps=15.
sweep:
  k_values: [1, 2, 3, 4, 5]
  sigma: 0.7
  p: 0.5

env:
  dt: 0.02
  max_steps: 500
  stun_steps: 15
  capture_radius: 0.03
  target_radius: 0.10
  target_pos: [0.5, 0.5]
  v_attacker: 1.0
  defender_inner_radius: 0.15
  defender_outer_radius: 0.35
  attacker_danger_radius: 0.15
  attacker_shaping: 0.01
  defender_shaping: 0.01

training:
  attacker_warmup_iters: 300
  central_defender_iters: 800
  snapshot_fractions: [0.4, 0.7, 1.0]
  attacker_hidden: 256
  attacker_n_layers: 2
  central_hidden: 256
  central_n_layers: 3
  sort_by_distance: true
  n_envs: 256
  n_steps: 128
  n_epochs: 4
  minibatch_size: 512
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

evaluation:
  n_episodes: 2000
  n_animations: 3

mode: "rl"
seed: 0
