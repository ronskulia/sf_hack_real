# Centralized-defender training config.
# Phase A: attacker (256x2 MLP) vs heuristic defender (300 iters, snapshotting)
# Phase B: centralized defender (256x3 MLP) vs population of attackers (800 iters)
sweep:
  k_values: [1, 2, 3]
  sigma: 0.5
  p: 0.7

env:
  dt: 0.02
  max_steps: 500
  capture_radius: 0.03
  target_radius: 0.10
  target_pos: [0.5, 0.5]
  v_attacker: 1.0
  defender_inner_radius: 0.15
  defender_outer_radius: 0.35
  attacker_danger_radius: 0.15
  attacker_shaping: 0.01
  defender_shaping: 0.01

training:
    attacker_warmup_iters: 120
    central_defender_iters: 300
    snapshot_fractions: [0.6, 1.0]
    attacker_hidden: 128
    attacker_n_layers: 2
    central_hidden: 128
    central_n_layers: 2
    n_envs: 1024
    n_steps: 32
    n_epochs: 2
    minibatch_size: 2048
    lr: 3.0e-4
    gamma: 0.99
    gae_lambda: 0.95
    clip_coef: 0.2
    ent_coef: 0.01
    vf_coef: 0.5
    max_grad_norm: 0.5
    # Save deterministic MP4 previews during phase A/B so long runs can be sanity checked.
    # Set partial_animation_every: 0 to disable; set partial_animation_max_steps: 0 for full-length episodes.
    partial_animation_every: 100
    partial_animation_max_steps: 250

evaluation:
    n_episodes: 500
    n_animations: 0
mode: "rl"
seed: 0
