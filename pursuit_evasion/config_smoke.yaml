# Tiny config for end-to-end smoke testing.
sweep:
  k_values: [1, 3]
  sigma: 1.0
  p: 0.7

env:
  dt: 0.02
  max_steps: 500
  capture_radius: 0.03
  target_radius: 0.10
  target_pos: [0.5, 0.5]
  v_attacker: 1.0
  defender_inner_radius: 0.15
  defender_outer_radius: 0.35
  defender_sensor_epsilon: 0.05
  defender_sensor_distance_scale: 0.5
  defender_sensor_smooth_time: 0.5
  attacker_danger_radius: 0.15
  attacker_shaping: 0.01
  defender_shaping: 0.01

training:
  attacker_warmup_iters: 5
  attacker_iters: 5
  defender_iters: 5
  n_alternations: 1
  n_envs: 64
  n_steps: 32
  n_epochs: 2
  minibatch_size: 128
  lr: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

evaluation:
  n_episodes: 200
  n_animations: 1

mode: "rl"
seed: 0
